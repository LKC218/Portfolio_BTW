
<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NEO-VISION // 视觉档案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'rgb(var(--background) / <alpha-value>)',
              surface: 'rgb(var(--surface) / <alpha-value>)',
              foreground: 'rgb(var(--foreground) / <alpha-value>)',
              muted: 'rgb(var(--muted) / <alpha-value>)',
              border: 'rgb(var(--border) / <alpha-value>)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Light Mode: "Warm Clarity" Aesthetic (温润清晰风格) */
        --background: 245 243 240; /* #F5F3F0 - Warm Off-White (暖米白) */
        --surface: 255 253 250;    /* #FFFDFA - Soft Cream White (柔奶油白) */
        --foreground: 28 25 23;    /* #1C1917 - Stone-900 (暖深棕黑) */
        --muted: 120 113 108;      /* #78716C - Stone-500 (暖灰) */
        --border: 214 211 209;     /* #D6D3D1 - Stone-300 (暖灰边框) */
      }
      .dark {
        /* Dark Mode: "Deep Space" Aesthetic */
        --background: 5 5 5;       /* #050505 */
        --surface: 24 24 27;       /* Zinc-900 */
        --foreground: 255 255 255; /* White */
        --muted: 156 163 175;      /* Gray-400 */
        --border: 255 255 255;     /* White (used with opacity) */
      }
      
      body {
        background-color: rgb(var(--background));
        color: rgb(var(--foreground));
        font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
        overflow-x: hidden;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom scrollbar for high-tech feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--background));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--muted) / 0.3);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--muted) / 0.5);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
