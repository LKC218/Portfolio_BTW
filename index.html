
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NEO-VISION // 视觉档案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: 'rgb(var(--background) / <alpha-value>)',
              surface: 'rgb(var(--surface) / <alpha-value>)',
              foreground: 'rgb(var(--foreground) / <alpha-value>)',
              muted: 'rgb(var(--muted) / <alpha-value>)',
              border: 'rgb(var(--border) / <alpha-value>)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --background: 5 5 5;
        --surface: 24 24 27;
        --foreground: 255 255 255;
        --muted: 156 163 175;
        --border: 255 255 255;
      }
      
      body {
        background-color: rgb(var(--background));
        color: rgb(var(--foreground));
        font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
        overflow-x: hidden;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom scrollbar for high-tech feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--background));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--muted) / 0.3);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--muted) / 0.5);
      }
      
      /* Audio Player Animations */
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      
      .animate-fadeIn {
        animation: fadeIn 0.3s ease-out;
      }


      
      /* Custom range slider styling */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        height: 4px;
        background: rgb(var(--border) / 0.2);
        border-radius: 2px;
        outline: none;
      }
      
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 12px;
        height: 12px;
        background: #10b981;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
        transition: transform 0.2s ease;
      }
      
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
      }
      
      input[type="range"]::-moz-range-thumb {
        width: 12px;
        height: 12px;
        background: #10b981;
        border-radius: 50%;
        cursor: pointer;
        border: none;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.2);
      }
      
      /* Transition: slide-in / slide-out (App.tsx) */
      @keyframes slide-in {
        0% { transform: translateX(100%); }
        100% { transform: translateX(0%); }
      }
      @keyframes slide-out {
        0% { transform: translateX(0%); }
        100% { transform: translateX(-100%); }
      }

      /* GridOverlay: scanner / orb / flicker / contour */
      @keyframes cyber-scan {
        0% { transform: translateY(-100%); opacity: 0; }
        10% { opacity: 1; }
        90% { opacity: 1; }
        100% { transform: translateY(100vh); opacity: 0; }
      }
      @keyframes orb-float-fast {
        0% { transform: translate(0, 0) scale(1); }
        33% { transform: translate(30px, -50px) scale(1.2); }
        66% { transform: translate(-20px, 20px) scale(0.9); }
        100% { transform: translate(0, 0) scale(1); }
      }
      @keyframes glitch-flicker {
        0% { opacity: 0.3; }
        5% { opacity: 1; }
        10% { opacity: 0.3; }
        15% { opacity: 1; }
        20% { opacity: 0.3; }
        100% { opacity: 0.3; }
      }
      @keyframes contour-drift {
        0% { background-position: 0% 0%; }
        100% { background-position: 10% 5%; }
      }

      /* DetailCard: wipe reveal */
      @keyframes reveal-swipe {
        0% { transform: scaleX(1); }
        100% { transform: scaleX(0); }
      }
      @keyframes image-scale-reveal {
        0% { transform: scale(1.1); filter: brightness(0.5); }
        100% { transform: scale(1); filter: brightness(1); }
      }

      /* FullscreenModelViewer: wipe reveal */
      @keyframes fs-reveal-swipe {
        0% { transform: scaleX(1); }
        100% { transform: scaleX(0); }
      }

      /* Shimmer bar (App.tsx) */
      @keyframes shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(200%); }
      }

      /* Custom cursor active state */
      html.custom-cursor-active,
      html.custom-cursor-active * {
        cursor: none !important;
      }

      /* Respect user motion preferences */
      @media (prefers-reduced-motion: reduce) {
        .animate-fadeIn,
        .animate-ping,
        .animate-pulse,
        [class*="animate-"] {
          animation: none !important;
        }

        .transition-all {
          transition: none !important;
        }
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
  </body>
</html>
