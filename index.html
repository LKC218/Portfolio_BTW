
<!DOCTYPE html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NEO-VISION // 视觉档案</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              background: 'rgb(var(--background) / <alpha-value>)',
              surface: 'rgb(var(--surface) / <alpha-value>)',
              foreground: 'rgb(var(--foreground) / <alpha-value>)',
              muted: 'rgb(var(--muted) / <alpha-value>)',
              border: 'rgb(var(--border) / <alpha-value>)',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        /* Light Mode: "Aerospace Clean" Aesthetic (Fresher, Brighter) */
        --background: 248 250 252; /* Ultra-light Slate-50 (Crisp & Clean) */
        --surface: 255 255 255;    /* Pure White */
        --foreground: 15 23 42;    /* Slate-900 (Sharp contrast tech blue-black) */
        --muted: 148 163 184;      /* Slate-400 (Softer, airier secondary text) */
        --border: 226 232 240;     /* Slate-200 (Subtle, refined structural lines) */
      }
      .dark {
        /* Dark Mode: "Deep Space" Aesthetic */
        --background: 5 5 5;       /* #050505 */
        --surface: 24 24 27;       /* Zinc-900 */
        --foreground: 255 255 255; /* White */
        --muted: 156 163 175;      /* Gray-400 */
        --border: 255 255 255;     /* White (used with opacity) */
      }
      
      body {
        background-color: rgb(var(--background));
        color: rgb(var(--foreground));
        font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
        overflow-x: hidden;
        transition: background-color 0.5s ease, color 0.5s ease;
      }
      .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom scrollbar for high-tech feel */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: rgb(var(--background));
      }
      ::-webkit-scrollbar-thumb {
        background: rgb(var(--muted) / 0.3);
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgb(var(--muted) / 0.5);
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@300;500;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0",
    "lucide-react": "https://esm.sh/lucide-react@^0.562.0",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
